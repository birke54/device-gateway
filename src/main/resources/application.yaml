spring:
  application:
    name: device-gateway

# Tokens and logs live under /data, mounted as a volume so they survive
# container restarts (see Dockerfile / docker-compose.yml).
device-gateway:
  upnp-device-ttl: 1800 # 30 minutes
  mdns-device-ttl: 86400 # 1 day
  device-sweeper-interval: 10 # 10 seconds
  token-store:
    path: /data/token-store.properties
  # Discovered device names, one per line, that you can rename by setting a value.
  device-names:
    path: /data/device-names.properties
  adb-cert-store:
    adb_key_pair_path: /data/.android/adbkey

# Listen port. Override with the SERVER_PORT env var (e.g. on Unraid if 8080
# is already taken on the NAS).
server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# Local Development Environment Overrides
spring:
  config:
    activate:
      on-profile: local

# Keep dev state inside the repo (under ./.local-data, gitignored) instead of the
# container's /data volume, so running locally needs no mounted directory.
device-gateway:
  token-store:
    path: ./.local-data/token-store.properties
  device-names:
    path: ./.local-data/device-names.properties
  adb-cert-store:
    adb_key_pair_path: ./.local-data/.android/adbkey

logging:
  level:
    lan.citadel.device_gateway: TRACE

---
# Production Environment Overrides (Docker)
spring:
  config:
    activate:
      on-profile: prod

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

logging:
  level:
    lan.citadel.device_gateway: INFO
  file:
    name: /data/device-gateway.log